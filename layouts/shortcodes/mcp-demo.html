<style>
  .mcp-demo {
    --border: #e5e5e5;
    --text: #0d0d0d;
    --text-muted: #6b6b6b;
    --accent: #10a37f;

    max-width: 720px;
    margin: 1.5rem auto;
    padding: 20px 24px;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--text);
    font-size: 15px;
    line-height: 1.55;
  }
  .mcp-demo .mcp-row {
    display: flex;
    gap: 14px;
    margin-bottom: 22px;
  }
  .mcp-demo .mcp-row:last-child { margin-bottom: 0; }
  .mcp-demo .mcp-av {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: #fff;
  }
  .mcp-demo .mcp-av.user { background: #6b4eb8; }
  .mcp-demo .mcp-av.bot  { background: #1a1a1a; }
  .mcp-demo .mcp-body { flex: 1; min-width: 0; padding-top: 3px; }
  .mcp-demo .mcp-who {
    font-weight: 600; font-size: 13.5px; margin-bottom: 4px;
  }
  .mcp-demo .mcp-body p { margin: 0 0 10px; }
  .mcp-demo .mcp-body code {
    background: #f0f0f0; padding: 2px 6px; border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
  }
  .mcp-demo .mcp-body pre {
    background: #f0f0f0; padding: 10px 12px; border-radius: 6px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px; overflow-x: auto; margin: 0 0 10px;
  }
  .mcp-demo .mcp-tool {
    background: #fafafa;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin: 6px 0 12px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px;
  }
  .mcp-demo .mcp-tool-icon {
    width: 20px; height: 20px; border-radius: 4px;
    background: #25d366; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .mcp-demo .mcp-tool-name {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: var(--accent); font-size: 12.5px;
  }
  .mcp-demo .mcp-tool-meta {
    margin-left: auto; color: var(--text-muted); font-size: 12px;
  }
  .mcp-demo .mcp-body h4 {
    font-size: 14px; font-weight: 600; margin: 14px 0 6px;
  }
  .mcp-demo .mcp-body ul { margin: 0 0 10px; padding-left: 20px; }
  .mcp-demo .mcp-body ul li { margin-bottom: 4px; }
  .mcp-demo .mcp-body strong { font-weight: 600; }
</style>

<div class="mcp-demo">
  <div class="mcp-row">
    <div class="mcp-av user">U</div>
    <div class="mcp-body">
      <div class="mcp-who">You</div>
      <p>{{ .Get "user" | safeHTML }}</p>
    </div>
  </div>

  <div class="mcp-row">
    <div class="mcp-av bot">✦</div>
    <div class="mcp-body">
      <div class="mcp-who">Agent</div>

      {{ with .Get "tool" }}
      <div class="mcp-tool">
        <div class="mcp-tool-icon">W</div>
        <span>Used <span class="mcp-tool-name">{{ . }}</span></span>
        <span class="mcp-tool-meta">via MCP · {{ $.Get "meta" }}</span>
      </div>
      {{ end }}

      {{ with .Get "tool2" }}
      <div class="mcp-tool">
        <div class="mcp-tool-icon">W</div>
        <span>Used <span class="mcp-tool-name">{{ . }}</span></span>
        <span class="mcp-tool-meta">via MCP · {{ $.Get "meta2" }}</span>
      </div>
      {{ end }}

      {{ $.Page.RenderString .Inner }}
    </div>
  </div>
</div>
